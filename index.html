<head>

<title>Ian 的晨間助手 ☀️</title>

<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="晨間助手">
<link id="pwa-icon" rel="apple-touch-icon" sizes="180x180" href="">
<script>
/* Generate home screen icon via Canvas */
(function(){
  try{
    var c=document.createElement('canvas');
    c.width=c.height=180;
    var x=c.getContext('2d');
    /* Rounded-square background (#E8651A amber) */
    var r=36;
    x.beginPath();
    x.moveTo(r,0);x.lineTo(180-r,0);
    x.quadraticCurveTo(180,0,180,r);
    x.lineTo(180,180-r);
    x.quadraticCurveTo(180,180,180-r,180);
    x.lineTo(r,180);
    x.quadraticCurveTo(0,180,0,180-r);
    x.lineTo(0,r);
    x.quadraticCurveTo(0,0,r,0);
    x.closePath();
    var bg=x.createLinearGradient(0,0,180,180);
    bg.addColorStop(0,'#F07830');bg.addColorStop(1,'#D05010');
    x.fillStyle=bg;x.fill();
    /* Sun body */
    var sun=x.createRadialGradient(82,78,4,90,86,38);
    sun.addColorStop(0,'#FFE97A');sun.addColorStop(1,'#FFBE00');
    x.fillStyle=sun;
    x.beginPath();x.arc(90,86,36,0,Math.PI*2);x.fill();
    /* Sun rays */
    x.strokeStyle='#FFD740';x.lineWidth=7;x.lineCap='round';
    for(var i=0;i<8;i++){
      var a=i*Math.PI/4;
      x.beginPath();
      x.moveTo(90+50*Math.cos(a),86+50*Math.sin(a));
      x.lineTo(90+68*Math.cos(a),86+68*Math.sin(a));
      x.stroke();
    }
    /* Set as apple-touch-icon */
    var lnk=document.getElementById('pwa-icon');
    if(lnk)lnk.href=c.toDataURL('image/png');
  }catch(e){}
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EEF2FF;--surface:#FFF;--sf2:#F5F7FF;--border:#DDE4F5;
  --t1:#1A1A3E;--t2:#4F46E5;--t3:#A5B0D8;
  --amber:#E8651A;--amb-l:#FFF5EF;--amb-d:#FDD5B8;
  --green:#10B981;--grn-l:#D1FAE5;
  --sh-s:0 1px 3px rgba(26,26,62,.05),0 4px 12px rgba(26,26,62,.06);
  --sh-m:0 4px 24px rgba(26,26,62,.09),0 1px 4px rgba(26,26,62,.04);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;max-width:520px;margin:0 auto}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--sh-s)}
.tab-btn{flex:1;padding:15px 8px;border:none;background:none;font-family:inherit;font-size:14px;font-weight:500;color:var(--t3);cursor:pointer;transition:color .2s;letter-spacing:.02em}
.tab-btn.active{color:var(--amber);box-shadow:inset 0 -2.5px 0 var(--amber)}
.pane{display:none}.pane.active{display:block}

/* MORNING HEADER */
.m-header{background:var(--surface);padding:14px 20px 14px;border-bottom:1px solid var(--border)}
.m-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.clock{font-family:'DM Mono',monospace;font-size:32px;font-weight:300;letter-spacing:-.03em}
.arr-wrap{text-align:right}
.arr-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:2px}
/* Native time input — no -webkit-appearance:none so Safari renders it properly */
#arr-input{
  font-family:'DM Mono',monospace;font-size:20px;font-weight:500;
  border:none;border-bottom:2px solid var(--amb-d);background:transparent;
  color:var(--amber);outline:none;cursor:pointer;padding:0 2px;
}
.prog-bar{height:5px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:7px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));border-radius:100px;transition:width .5s ease;width:0%}
.prog-foot{display:flex;justify-content:space-between;align-items:center}
.prog-text{font-size:12px;color:var(--t3);font-weight:500}
.eta-text{font-size:12px;color:var(--t3);font-weight:500;white-space:nowrap;text-align:right;line-height:1.5}
.eta-abs{color:var(--t2);font-family:'DM Mono',monospace;font-size:13px}
.eta-rem{font-size:11px;color:var(--t3)}

/* START SCREEN */
#start-screen{padding:32px 24px 22px;text-align:center}
.s-greeting{font-size:38px;font-weight:300;letter-spacing:-.03em;margin-bottom:6px}
.s-sub{font-size:15px;color:var(--t3);margin-bottom:6px;line-height:1.65}
.wake-hint{font-size:13px;color:var(--amber);font-family:'DM Mono',monospace;margin-bottom:24px;font-weight:500}
.s-tips{background:var(--amb-l);border:1px solid var(--amb-d);border-radius:16px;padding:16px 20px;font-size:14px;line-height:2;text-align:left;margin-bottom:28px}
.s-tips-label{display:block;font-size:10px;font-weight:700;color:var(--amber);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.btn-start{background:var(--amber);color:#fff;border:none;border-radius:100px;padding:16px 52px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(232,101,26,.4);transition:transform .15s,box-shadow .15s}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(232,101,26,.5)}

/* ACTIVE TASK CARD */
#task-card{margin:14px 16px;background:var(--surface);border-radius:22px;padding:22px 22px 18px;box-shadow:var(--sh-m);display:none}
.tc-header{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.tc-emoji{font-size:30px;line-height:1}
.tc-name{font-size:20px;font-weight:600;letter-spacing:-.01em}
.tc-note{font-size:13px;color:var(--t3);margin-top:3px}

/* RING */
.ring-wrap{position:relative;width:min(190px,58vw);height:min(190px,58vw);margin:0 auto 20px}
.ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:10}
.ring-prog{fill:none;stroke:var(--amber);stroke-width:10;stroke-linecap:round;stroke-dasharray:502.655;stroke-dashoffset:0;transition:stroke-dashoffset .95s linear,stroke .35s ease}
.ring-prog.done{stroke:var(--green)}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-time{font-family:'DM Mono',monospace;font-size:36px;font-weight:300;letter-spacing:-.03em;line-height:1}
.ring-sub{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-top:6px}
@keyframes ring-glow{0%,100%{filter:drop-shadow(0 0 0px rgba(232,101,26,0))}50%{filter:drop-shadow(0 0 12px rgba(232,101,26,.65))}}
.ring-svg.glowing{animation:ring-glow 1.3s ease infinite}

/* MIT */
.mit-box{background:var(--sf2);border:1.5px solid var(--border);border-radius:13px;padding:12px 15px;margin-bottom:15px;display:none}
.mit-label{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
input.mit-input{width:100%;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--t1);outline:none;-webkit-user-select:text;user-select:text}
input.mit-input::placeholder{color:var(--t3)}

/* BUTTONS */
.btn-row{display:flex;gap:10px;margin-bottom:14px}
.btn-sec{flex:1;background:var(--sf2);border:1px solid var(--border);border-radius:13px;padding:13px 8px;font-family:inherit;font-size:14px;font-weight:500;color:var(--t2);cursor:pointer;transition:background .15s}
.btn-sec:hover{background:var(--border)}
.btn-pri{flex:2;background:var(--amber);border:none;border-radius:13px;padding:13px 8px;font-family:inherit;font-size:14px;font-weight:600;color:#fff;cursor:pointer;box-shadow:0 2px 10px rgba(232,101,26,.28);transition:opacity .15s}
.btn-pri:hover{opacity:.9}
.mode-row{display:flex;align-items:center;justify-content:center;gap:9px;font-size:13px;color:var(--t3)}
.toggle-sw{position:relative;display:inline-block;width:42px;height:23px;cursor:pointer}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-knob{position:absolute;inset:0;background:var(--border);border-radius:100px;transition:.2s}
.toggle-knob::before{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
input:checked~.toggle-knob{background:var(--amber)}
input:checked~.toggle-knob::before{transform:translateX(19px)}
.mode-active{font-weight:500;color:var(--t1)}

/* TASK LIST */
#task-list{padding:0 16px 28px}
.tl-header{display:flex;align-items:baseline;gap:8px;padding:8px 2px 6px}
.tl-title{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.tl-hint{font-size:11px;color:var(--t3);opacity:.6}

/* DRAGGABLE TASK CARDS — Safari text-selection prevention */
#tli{
  -webkit-user-select:none;
  user-select:none;
}
.task-card{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px 10px 6px;border-radius:13px;margin-bottom:4px;
  background:var(--surface);
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  transition:box-shadow .15s,opacity .2s;will-change:transform;
}
.task-card.done{opacity:.4}
.task-card.current{background:var(--amb-l);border:1px solid var(--amb-d);box-shadow:0 2px 8px rgba(232,101,26,.12)}
.drag-handle{
  cursor:grab;padding:4px 7px;color:var(--t3);flex-shrink:0;
  touch-action:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  display:flex;align-items:center;border-radius:6px;
  transition:color .15s,background .15s;-webkit-tap-highlight-color:transparent;
}
.drag-handle:hover{color:var(--t2);background:var(--sf2)}
.drag-handle:active{cursor:grabbing;color:var(--t2)}

/* Ghost (body-level during drag) */
.drag-ghost-el{
  position:fixed;pointer-events:none;z-index:9999;
  display:flex;align-items:center;gap:10px;padding:10px 12px 10px 6px;
  opacity:.85;border-radius:13px;background:var(--surface);
  box-shadow:0 14px 44px rgba(26,26,62,.24);transform:scale(1.03);
  transition:none!important;will-change:top,left;
  -webkit-user-select:none;user-select:none;
}
/* Drop spacer */
.drag-spacer{background:var(--amb-l);border:1.5px dashed var(--amb-d);border-radius:13px;margin-bottom:4px;flex-shrink:0}

/* Status icons */
.ti-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.ic-done{background:var(--grn-l);color:var(--green);font-weight:700}
.ic-cur{background:var(--amber);width:10px;height:10px;animation:dot-pulse 1.6s ease infinite}
.ic-up{border:2px solid var(--border)}
@keyframes dot-pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,101,26,.5)}60%{box-shadow:0 0 0 5px rgba(232,101,26,0)}}
.ti-emoji{font-size:18px;flex-shrink:0}
.ti-info{flex:1;min-width:0}
.ti-eta{font-size:11px;color:var(--amber);font-family:'DM Mono',monospace;font-weight:500;margin-top:3px}
.ti-name{font-size:15px;font-weight:500}
.ti-meta{font-size:12px;color:var(--t3);font-family:'DM Mono',monospace}
.task-card.done .ti-name{color:var(--t3)}

/* DONE SCREEN */
#done-screen{padding:48px 24px 40px;text-align:center;display:none}
.done-icon{font-size:64px;margin-bottom:14px}
.done-title{font-size:34px;font-weight:600;letter-spacing:-.03em;margin-bottom:6px}
.done-sub{font-size:15px;color:var(--t3);margin-bottom:28px;line-height:1.65}
.done-mit{background:var(--amb-l);border:1px solid var(--amb-d);border-radius:14px;padding:16px 18px;font-size:15px;text-align:left;margin-bottom:28px;line-height:1.55;display:none}
.done-mit strong{display:block;font-size:10px;font-weight:700;color:var(--amber);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.btn-reset{background:transparent;border:1.5px solid var(--border);border-radius:100px;padding:12px 32px;font-family:inherit;font-size:14px;color:var(--t3);cursor:pointer;transition:all .15s}
.btn-reset:hover{border-color:var(--t2);color:var(--t2)}

/* EVENING */
#evening-pane{background:#0B1121;min-height:100vh;padding:24px 16px}
.e-header{text-align:center;padding:20px 0 26px}
.e-big{font-size:48px;margin-bottom:10px}
.e-title{font-size:22px;font-weight:600;color:#ECF0FF;letter-spacing:-.01em}
.e-sub{font-size:13px;color:#3D4F72;margin-top:5px}
.e-prog-bar{background:#141E33;border-radius:100px;height:4px;overflow:hidden;margin-bottom:7px}
.e-prog-fill{height:100%;background:linear-gradient(90deg,#6C63FF,#A78BFA);border-radius:100px;transition:width .3s;width:0%}
.e-prog-text{font-size:12px;color:#3D4F72;text-align:center;margin-bottom:18px}
.e-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.e-item{background:#141E33;border:1px solid #1E2D48;border-radius:16px;padding:16px;display:flex;align-items:flex-start;gap:13px;cursor:pointer;transition:background .12s,opacity .2s}
.e-item:hover{background:#192540}
.e-item.checked{opacity:.38}
.e-cb{width:22px;height:22px;border-radius:7px;border:2px solid #2A3A58;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:12px;font-weight:700;color:#fff;transition:all .15s}
.e-item.checked .e-cb{background:#6C63FF;border-color:#6C63FF}
.e-emoji{font-size:20px;margin-top:2px}
.e-body{flex:1}
.e-name{font-size:15px;font-weight:500;color:#C8D5F0}
.e-note{font-size:12px;color:#3D4F72;margin-top:3px;line-height:1.55}
.btn-e-reset{display:block;width:100%;background:transparent;border:1px solid #1E2D48;border-radius:13px;padding:13px;font-family:inherit;font-size:14px;color:#3D4F72;cursor:pointer;transition:all .15s}
.btn-e-reset:hover{border-color:#2A3A58;color:#6B7AA8}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" id="tab-m" onclick="switchTab('morning')">☀️ 早晨</button>
  <button class="tab-btn"        id="tab-e" onclick="switchTab('evening')">🌙 前一晚準備</button>
</div>

<div id="morning-pane" class="pane active">

  <div class="m-header">
    <div class="m-top">
      <div class="clock" id="clock">--:--</div>
      <div class="arr-wrap">
        <span class="arr-label">🚶 抵達公司</span>
        <input type="time" id="arr-input" value="08:45" onchange="setArrival(this.value)">
      </div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-foot">
      <div class="prog-text" id="prog-text">尚未開始</div>
      <div class="eta-text" id="eta-text"></div>
    </div>
  </div>

  <div id="start-screen">
    <div class="s-greeting">早安 Ian ☀️</div>
    <div class="s-sub">今天是美好的一天</div>
    <div class="wake-hint" id="wake-hint">建議 7:00 起床 · 8:30 出門</div>
    <div class="s-tips">
      <span class="s-tips-label">起床後，先做這三件事</span>
      💧 喝一杯常溫水<br>
      🪟 開窗透氣<br>
      ☕ 按下咖啡機
    </div>
    <button class="btn-start" onclick="beginRoutine()">開始今天的早晨</button>
  </div>

  <div id="task-card">
    <div class="tc-header">
      <div class="tc-emoji" id="tc-emoji"></div>
      <div><div class="tc-name" id="tc-name"></div><div class="tc-note" id="tc-note"></div></div>
    </div>
    <div class="ring-wrap">
      <svg class="ring-svg" id="ring-svg" viewBox="0 0 200 200">
        <circle class="ring-bg"   cx="100" cy="100" r="80"/>
        <circle class="ring-prog" id="ring-prog" cx="100" cy="100" r="80"/>
      </svg>
      <div class="ring-inner">
        <div class="ring-time" id="ring-time">--:--</div>
        <div class="ring-sub"  id="ring-sub">剩餘</div>
      </div>
    </div>
    <div class="mit-box" id="mit-box">
      <div class="mit-label">✏️&nbsp;今日最重要的一件事 MIT</div>
      <input class="mit-input" id="mit-input" type="text" placeholder="寫下今天要完成的最重要事項…" maxlength="80">
    </div>
    <div class="btn-row">
      <button class="btn-sec" id="pause-btn" onclick="togglePause()">⏸ 暫停</button>
      <button class="btn-pri" onclick="completeTask()">完成，下一步 →</button>
    </div>
    <div class="mode-row">
      <span>手動</span>
      <label class="toggle-sw">
        <input type="checkbox" id="auto-chk" onchange="autoMode=this.checked">
        <span class="toggle-knob"></span>
      </label>
      <span class="mode-active">自動前進</span>
    </div>
  </div>

  <div id="task-list">
    <div class="tl-header">
      <span class="tl-title">今日行程</span>
      <span class="tl-hint">⠿ 左側拖曳調整順序</span>
    </div>
    <div id="tli"></div>
  </div>

  <div id="done-screen">
    <div class="done-icon">🚶</div>
    <div class="done-title">出門！</div>
    <div class="done-sub" id="done-sub">早晨完美結束<br>好好享受今天</div>
    <div class="done-mit" id="done-mit"><strong>今日 MIT</strong><span id="done-mit-text"></span></div>
    <button class="btn-reset" onclick="resetRoutine()">🔄 重置，明天見</button>
  </div>

</div>

<div id="evening-pane" class="pane">
  <div class="e-header">
    <div class="e-big">🌙</div>
    <div class="e-title">前一晚準備清單</div>
    <div class="e-sub">10 分鐘，讓明早零摩擦啟動</div>
  </div>
  <div class="e-prog-bar"><div class="e-prog-fill" id="e-prog-fill"></div></div>
  <div class="e-prog-text" id="e-prog-text">0 / 6 完成</div>
  <div class="e-list" id="e-list"></div>
  <button class="btn-e-reset" onclick="resetEvening()">🔄 重置清單</button>
</div>

<script>
/* ── UTILITIES ── */
function $(id){return document.getElementById(id)}
function pad(n){return String(n).padStart(2,'0')}
function show(id,v){$(id).style.display=v?'block':'none'}

/* ── TASKS ── */
let TASKS=[
  {emoji:'🧴',name:'洗臉',               dur:5*60, note:''},
  {emoji:'💇',name:'整理頭髮',           dur:13*60,note:'放音樂享受 🎵'},
  {emoji:'☕',name:'咖啡 + 早餐',        dur:20*60,note:'不看手機 📵'},
  {emoji:'🚬',name:'抽菸',               dur:10*60,note:''},
  {emoji:'🚽',name:'上廁所',             dur:15*60,note:''},
  {emoji:'🪥',name:'刷牙',               dur:5*60, note:''},
  {emoji:'📖',name:'閱讀 / 冥想',        dur:17*60,note:'享受安靜時光'},
  {emoji:'🎒',name:'收拾包包 & 確認 MIT',dur:5*60, note:'',isMIT:true},
];
const EVE=[
  {emoji:'📋',name:'確認明天行程',  note:'打開行事曆，掌握明天的重點'},
  {emoji:'👔',name:'備好明天的衣服',note:'整套放固定位置，省去早晨決策'},
  {emoji:'☕',name:'備好咖啡器具',  note:'豆子磨好、濾紙放好、水倒好'},
  {emoji:'🎒',name:'整理好包包',    note:'確認錢包、鑰匙、識別證、充電器'},
  {emoji:'📵',name:'手機靜音放床外',note:'設好 7:00 鬧鐘，只設一個'},
  {emoji:'🌙',name:'開始收心',      note:'調暗燈光、翻書，目標 11:00 前躺平'},
];
const RING_C=2*Math.PI*80;
const WALK_MIN=15;

/* ── STATE ── */
let arrH=8,arrM=45;
let curIdx=0,tLeft=0,tTotal=0,timerIv=null;
let paused=false,autoMode=false,started=false,finished=false;
let mitVal='',eveDone=loadEveningState(),drag=null;

/* ── SCHEDULE HELPERS ── */
function totalTaskMins(){return TASKS.reduce((s,t)=>s+t.dur/60,0)}
function startMins(){return arrH*60+arrM-WALK_MIN-totalTaskMins()}
function departureMins(){return arrH*60+arrM-WALK_MIN}
function calcSched(idx){
  let m=startMins();
  for(let i=0;i<idx;i++)m+=TASKS[i].dur/60;
  return pad(Math.floor(m/60))+':'+pad(m%60);
}
function setArrival(val){
  const parts=val.split(':');
  arrH=parseInt(parts[0],10);arrM=parseInt(parts[1],10);
  renderTasks();updateAll();
}
function updateWakeHint(){
  const sm=startMins(),dm=departureMins();
  $('wake-hint').textContent='建議 '+pad(Math.floor(sm/60))+':'+pad(sm%60)+' 起床  ·  '+pad(Math.floor(dm/60))+':'+pad(dm%60)+' 出門';
}

/* ── TABS / CLOCK ── */
function switchTab(t){
  const isM=t==='morning';
  $('tab-m').classList.toggle('active',isM);
  $('tab-e').classList.toggle('active',!isM);
  $('morning-pane').classList.toggle('active',isM);
  $('evening-pane').classList.toggle('active',!isM);
}
function tickClock(){const n=new Date();$('clock').textContent=pad(n.getHours())+':'+pad(n.getMinutes())}

/* ── PROGRESS / ETA ── */
function calcETA(){
  if(!started||finished)return null;
  let r=tLeft;
  for(let i=curIdx+1;i<TASKS.length;i++)r+=TASKS[i].dur;
  const t=new Date(Date.now()+r*1000);
  return pad(t.getHours())+':'+pad(t.getMinutes());
}
function updateAll(){
  const fill=$('prog-fill'),ptxt=$('prog-text'),etxt=$('eta-text');
  if(!started){fill.style.width='0%';ptxt.textContent='尚未開始';etxt.innerHTML=''}
  else if(finished){fill.style.width='100%';ptxt.textContent='✅ 全部完成！';etxt.innerHTML=''}
  else{
    fill.style.width=(curIdx/TASKS.length*100)+'%';
    ptxt.textContent=curIdx+' / '+TASKS.length+' 完成';
    let r=tLeft;
    for(let i=curIdx+1;i<TASKS.length;i++)r+=TASKS[i].dur;
    const t=new Date(Date.now()+r*1000);
    const absTime=pad(t.getHours())+':'+pad(t.getMinutes());
    const remM=Math.floor(r/60),remS=r%60;
    etxt.innerHTML='<span class="eta-abs">'+absTime+'</span> 完成<br>'
      +'<span class="eta-rem">還剩 '+pad(remM)+':'+pad(remS)+'</span>';
    // Update current task's own ETA (every second)
    const taskEtaEl=$('task-eta-display');
    if(taskEtaEl&&tLeft>0){
      const ft=new Date(Date.now()+tLeft*1000);
      taskEtaEl.textContent='→ '+pad(ft.getHours())+':'+pad(ft.getMinutes())+' 完成';
    }
  }
  updateWakeHint();
}

/* ── RING ── */
function updateRing(){
  const prog=$('ring-prog'),rt=$('ring-time'),rs=$('ring-sub'),svg=$('ring-svg');
  const frac=tTotal>0?tLeft/tTotal:0;
  prog.style.strokeDashoffset=RING_C*(1-frac);
  rt.textContent=pad(Math.floor(tLeft/60))+':'+pad(tLeft%60);
  if(tLeft===0){prog.classList.add('done');rs.textContent='時間到！';svg.classList.add('glowing')}
  else{prog.classList.remove('done');rs.textContent='剩餘';svg.classList.remove('glowing')}
}

/* ── LOAD TASK ── */
function loadTask(idx){
  const t=TASKS[idx];
  $('tc-emoji').textContent=t.emoji;
  $('tc-name').textContent=t.name;
  $('tc-note').textContent=t.note||'';
  $('mit-box').style.display=t.isMIT?'block':'none';
  tLeft=t.dur;tTotal=t.dur;
  updateRing();renderTasks();updateAll();
}

/* ── ROUTINE ── */
function beginRoutine(){
  started=true;curIdx=0;
  show('start-screen',false);show('task-card',true);
  loadTask(0);startTimer();
}
function startTimer(){
  clearInterval(timerIv);paused=false;$('pause-btn').textContent='⏸ 暫停';
  timerIv=setInterval(function(){
    if(paused)return;
    if(tLeft>0){tLeft--;updateRing();updateAll()}
    else{clearInterval(timerIv);playChime();if(autoMode)setTimeout(completeTask,1800)}
  },1000);
}
function togglePause(){paused=!paused;$('pause-btn').textContent=paused?'▶ 繼續':'⏸ 暫停'}
function completeTask(){
  clearInterval(timerIv);
  if(TASKS[curIdx].isMIT)mitVal=$('mit-input').value.trim();
  curIdx++;
  if(curIdx>=TASKS.length){finishRoutine();return}
  loadTask(curIdx);startTimer();
}
function jumpToTask(idx){
  if(!started||finished||idx<=curIdx)return;
  clearInterval(timerIv);
  if(TASKS[curIdx].isMIT)mitVal=$('mit-input').value.trim();
  curIdx=idx;loadTask(idx);startTimer();
}
function finishRoutine(){
  finished=true;clearInterval(timerIv);
  show('task-card',false);show('task-list',false);show('done-screen',true);
  $('done-sub').innerHTML='早晨完美結束<br>預計 '+pad(arrH)+':'+pad(arrM)+' 抵達公司，加油！';
  if(mitVal){$('done-mit').style.display='block';$('done-mit-text').textContent=mitVal}
  updateAll();
}
function resetRoutine(){
  started=finished=paused=false;curIdx=tLeft=tTotal=0;mitVal='';
  clearInterval(timerIv);$('mit-input').value='';$('done-mit').style.display='none';
  $('ring-prog').classList.remove('done');$('ring-svg').classList.remove('glowing');
  show('done-screen',false);show('task-card',false);
  show('task-list',true);show('start-screen',true);
  renderTasks();updateAll();
}

/* ── RENDER TASK LIST ── */
const GRIP='<svg width="10" height="16" viewBox="0 0 10 16" fill="currentColor">'
  +'<circle cx="3" cy="3" r="1.5"/><circle cx="7" cy="3" r="1.5"/>'
  +'<circle cx="3" cy="8" r="1.5"/><circle cx="7" cy="8" r="1.5"/>'
  +'<circle cx="3" cy="13" r="1.5"/><circle cx="7" cy="13" r="1.5"/></svg>';

function renderTasks(){
  $('tli').innerHTML=TASKS.map(function(t,i){
    var done=started&&i<curIdx;
    var cur=started&&!finished&&i===curIdx;
    var cls=done?'done':cur?'current':'';
    var icon=done?'<div class="ti-icon ic-done">✓</div>'
      :cur?'<div class="ti-icon ic-cur"></div>'
      :'<div class="ti-icon ic-up"></div>';
    var jump=(!done&&!cur&&started&&!finished)?'onclick="jumpToTask('+i+')"':'';
    var taskETA = cur ? '<div class="ti-eta" id="task-eta-display"></div>' : '';
    return '<div class="task-card '+cls+'" data-di="'+i+'" '+jump+'>'
      +'<div class="drag-handle" onpointerdown="dragStart(event,'+i+')" oncontextmenu="return false">'+GRIP+'</div>'
      +icon+'<span class="ti-emoji">'+t.emoji+'</span>'
      +'<div class="ti-info">'
      +'<div class="ti-name">'+t.name+'</div>'
      +'<div class="ti-meta">'+calcSched(i)+' ／ '+t.dur/60+' 分鐘</div>'
      +taskETA
      +'</div></div>';
  }).join('');
}

/* ── DRAG AND DROP ── */
function dragStart(e,fromIdx){
  e.preventDefault();
  e.stopPropagation();
  /* Lock text selection globally during drag (Safari fix) */
  document.documentElement.style.webkitUserSelect='none';
  document.documentElement.style.userSelect='none';

  var handle=e.currentTarget;
  var card=handle.closest('[data-di]');
  var rect=card.getBoundingClientRect();
  var list=$('tli');

  var ghost=card.cloneNode(true);
  ghost.classList.add('drag-ghost-el');
  ghost.style.top=rect.top+'px';
  ghost.style.left=rect.left+'px';
  ghost.style.width=rect.width+'px';
  ghost.style.height=rect.height+'px';
  document.body.appendChild(ghost);

  var spacer=document.createElement('div');
  spacer.className='drag-spacer';
  spacer.style.height=rect.height+'px';
  list.insertBefore(spacer,card);
  card.style.display='none';

  drag={fromIdx:fromIdx,card:card,ghost:ghost,spacer:spacer,list:list,
    oy:e.clientY-rect.top,ox:e.clientX-rect.left,gh:rect.height,
    pid:e.pointerId};
  handle.setPointerCapture(e.pointerId);
  document.addEventListener('pointermove',onMove,{passive:false});
  document.addEventListener('pointerup',onUp);
  document.addEventListener('pointercancel',onUp);
}

function onMove(e){
  if(!drag)return;
  e.preventDefault();
  drag.ghost.style.top=(e.clientY-drag.oy)+'px';
  drag.ghost.style.left=(e.clientX-drag.ox)+'px';

  var cY=e.clientY-drag.oy+drag.gh/2;
  var cards=Array.prototype.slice.call(drag.list.querySelectorAll('.task-card'));
  var target=null;
  for(var i=0;i<cards.length;i++){
    var r=cards[i].getBoundingClientRect();
    if(cY<r.top+r.height/2){target=cards[i];break}
  }

  /* FLIP animation */
  var before=cards.map(function(c){return c.getBoundingClientRect().top});
  if(target)drag.list.insertBefore(drag.spacer,target);
  else drag.list.appendChild(drag.spacer);
  cards.forEach(function(c,i){
    var delta=before[i]-c.getBoundingClientRect().top;
    if(Math.abs(delta)>.5){c.style.transition='none';c.style.transform='translateY('+delta+'px)'}
  });
  drag.list.offsetHeight;
  cards.forEach(function(c){
    if(c.style.transform){c.style.transition='transform 0.16s ease';c.style.transform=''}
  });
}

function onUp(){
  if(!drag)return;
  /* Restore text selection */
  document.documentElement.style.webkitUserSelect='';
  document.documentElement.style.userSelect='';

  var fromIdx=drag.fromIdx,card=drag.card,ghost=drag.ghost,spacer=drag.spacer,list=drag.list;
  var items=Array.prototype.slice.call(list.children);
  var sp=items.indexOf(spacer);
  var newIdx=0;
  for(var i=0;i<sp;i++)if(items[i].classList.contains('task-card'))newIdx++;

  if(newIdx!==fromIdx){
    var task=TASKS.splice(fromIdx,1)[0];
    TASKS.splice(newIdx,0,task);
    if(started&&!finished){
      if(fromIdx===curIdx)curIdx=newIdx;
      else if(fromIdx<curIdx&&newIdx>=curIdx)curIdx--;
      else if(fromIdx>curIdx&&newIdx<=curIdx)curIdx++;
    }
  }

  ghost.remove();spacer.remove();card.style.display='';
  Array.prototype.slice.call(list.querySelectorAll('.task-card')).forEach(function(c){
    c.style.transform='';c.style.transition='';
  });
  drag=null;
  document.removeEventListener('pointermove',onMove);
  document.removeEventListener('pointerup',onUp);
  document.removeEventListener('pointercancel',onUp);
  renderTasks();updateAll();
}

/* ── CHIME ── */
function playChime(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1108,.18],[1320,.36]].forEach(function(pair){
      var f=pair[0],dt=pair[1];
      var o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;
      var t=ac.currentTime+dt;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.06);g.gain.linearRampToValueAtTime(0,t+.55);
      o.start(t);o.stop(t+.6);
    });
  }catch(e){}
}

/* ── EVENING ── */
function loadEveningState(){
  try{return new Set(JSON.parse(localStorage.getItem('ian-eve')||'[]'))}
  catch(e){return new Set()}
}
function saveEveningState(){
  try{localStorage.setItem('ian-eve',JSON.stringify(Array.from(eveDone)))}
  catch(e){}
}
function toggleEvening(i){eveDone.has(i)?eveDone.delete(i):eveDone.add(i);saveEveningState();renderEveningList()}
function resetEvening(){eveDone=new Set();saveEveningState();renderEveningList()}
function renderEveningList(){
  $('e-list').innerHTML=EVE.map(function(t,i){
    return '<div class="e-item '+(eveDone.has(i)?'checked':'')+'" onclick="toggleEvening('+i+')">'
    +'<div class="e-cb">'+(eveDone.has(i)?'✓':'')+'</div>'
    +'<div class="e-emoji">'+t.emoji+'</div>'
    +'<div class="e-body"><div class="e-name">'+t.name+'</div><div class="e-note">'+t.note+'</div></div>'
    +'</div>';
  }).join('');
  var n=eveDone.size,tot=EVE.length;
  $('e-prog-fill').style.width=(n/tot*100)+'%';
  $('e-prog-text').textContent=n+' / '+tot+' 完成';
}

/* ── INIT (last — all consts/functions defined above) ── */
setInterval(tickClock,1000);tickClock();
renderTasks();renderEveningList();updateAll();
</script>
